# ── SonarQube Configuration for PulseCheck Backend ────────────────
sonar.projectKey=pulsecheck-backend
sonar.projectName=PulseCheck Backend
sonar.projectVersion=0.1.0

# Source & test paths
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js,tests/**/*.spec.js

# Exclusions
sonar.exclusions=node_modules/**,coverage/**,dist/**,tests/**

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Coverage reports (Jest + lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gate thresholds (referenced by Jenkinsfile)
sonar.qualitygate.wait=true
